<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员 - 投票数据查看</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f7fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 10px;
        }
        .status-tip {
            padding: 10px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .status-open {
            background-color: #f0fff4;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        .status-end {
            background-color: #fff5f5;
            color: #742a2a;
            border: 1px solid #feb2b2;
        }
        .stats-card {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat-item {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-item h3 {
            font-size: 16px;
            color: #718096;
            margin-bottom: 10px;
        }
        .stat-item p {
            font-size: 36px;
            font-weight: bold;
        }
        .agree-num {
            color: #48bb78;
        }
        .refuse-num {
            color: #f56565;
        }
        .total-num {
            color: #2d3748;
        }
        .table-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background-color: #edf2f7;
        }
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            font-weight: 600;
            color: #2d3748;
        }
        .agree-tag {
            color: #48bb78;
            font-weight: 500;
        }
        .refuse-tag {
            color: #f56565;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>蓝羽奇怪代码网站 投票数据管理</h1>
        <div id="statusTip" class="status-tip"></div>
        <p style="color: #718096; margin-bottom: 20px;">投票截止时间：2026年4月26日 12:00（北京时间）</p>

        <div class="stats-card">
            <div class="stat-item">
                <h3>总投票数</h3>
                <p class="total-num" id="totalCount">0</p>
            </div>
            <div class="stat-item">
                <h3>同意数</h3>
                <p class="agree-num" id="agreeCount">0</p>
            </div>
            <div class="stat-item">
                <h3>不同意数</h3>
                <p class="refuse-num" id="refuseCount">0</p>
            </div>
        </div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>投票选择</th>
                        <th>提交时间</th>
                    </tr>
                </thead>
                <tbody id="voteTableBody">
                    <!-- 投票数据会自动填充到这里 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 替换成你自己的表单ID和API密钥
        const FORM_ID = 'xojylkae';
        const API_KEY = '你的Formspree API密钥';
        // 投票截止时间，和玩家页保持一致
        const VOTE_END_TIME = new Date('2026-04-26T12:00:00+08:00');

        // 页面加载时获取投票数据
        window.onload = async function() {
            // 先显示投票状态
            const now = new Date();
            const statusTip = document.getElementById('statusTip');
            if (now >= VOTE_END_TIME) {
                statusTip.className = 'status-tip status-end';
                statusTip.innerText = '投票已截止';
            } else {
                statusTip.className = 'status-tip status-open';
                statusTip.innerText = '投票进行中';
            }

            try {
                // 调用Formspree API获取提交数据
                const response = await fetch(`https://formspree.io/api/forms/${FORM_ID}/submissions`, {
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Accept': 'application/json'
                    }
                });
                const data = await response.json();
                const submissions = data.submissions;

                // 统计数据
                let total = submissions.length;
                let agreeCount = 0;
                let refuseCount = 0;
                let tableHtml = '';

                // 遍历所有提交记录
                submissions.forEach((item, index) => {
                    const voteResult = item.data['投票选择'];
                    const submitTime = item.data['提交时间'];
                    
                    // 统计同意/不同意数量
                    if (voteResult === '同意') agreeCount++;
                    if (voteResult === '不同意') refuseCount++;

                    // 拼接表格行
                    tableHtml += `
                        <tr>
                            <td>${index + 1}</td>
                            <td><span class="${voteResult === '同意' ? 'agree-tag' : 'refuse-tag'}">${voteResult}</span></td>
                            <td>${submitTime || '无'}</td>
                        </tr>
                    `;
                });

                // 渲染数据到页面
                document.getElementById('totalCount').innerText = total;
                document.getElementById('agreeCount').innerText = agreeCount;
                document.getElementById('refuseCount').innerText = refuseCount;
                document.getElementById('voteTableBody').innerHTML = tableHtml;

            } catch (error) {
                console.error('数据获取失败', error);
                alert('数据加载失败，请检查表单ID和API密钥是否正确');
            }
        }
    </script>
</body>
</html>
