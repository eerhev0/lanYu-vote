<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝羽奇怪代码网站 投票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 50px;
            line-height: 1.5;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 15px 50px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .agree-btn {
            background-color: #48bb78;
            color: white;
        }
        .agree-btn:hover {
            background-color: #38a169;
        }
        .refuse-btn {
            background-color: #f56565;
            color: white;
        }
        .refuse-btn:hover {
            background-color: #e53e3e;
        }
        /* 通用隐藏盒子样式 */
        .disabled-box, .end-box {
            display: none;
        }
        .disabled-box h2, .end-box h2 {
            font-size: 22px;
            color: #718096;
            margin-bottom: 20px;
        }
        .disabled-box p, .end-box p {
            color: #a0aec0;
            font-size: 16px;
        }
        .success-tip {
            display: none;
            margin-top: 30px;
            color: #48bb78;
            font-size: 16px;
        }
        .time-tip {
            margin-top: 30px;
            color: #718096;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 正常投票区域 -->
        <div id="voteBox">
            <h1>是否继续制作蓝羽奇怪代码网站？</h1>
            <form id="voteForm" method="POST" action="xojylkae">
                <!-- 隐藏的投票值输入框 -->
                <input type="hidden" id="voteResult" name="投票选择" required>
                <!-- 提交时间 -->
                <input type="hidden" id="submitTime" name="提交时间">
                <div class="btn-group">
                    <button type="button" class="agree-btn" onclick="submitVote('同意')">同意</button>
                    <button type="button" class="refuse-btn" onclick="submitVote('不同意')">不同意</button>
                </div>
            </form>
            <div class="success-tip" id="successTip">投票提交成功，感谢你的参与！</div>
            <p class="time-tip" id="timeTip">投票截止时间：2026年4月26日 12:00（北京时间）</p>
        </div>

        <!-- 已投票禁止重复提交区域 -->
        <div class="disabled-box" id="disabledBox">
            <h2>你已经提交过投票啦</h2>
            <p>同一设备仅可参与一次投票，感谢你的支持</p>
            <p class="time-tip">投票截止时间：2026年4月26日 12:00（北京时间）</p>
        </div>

        <!-- 投票已截止区域 -->
        <div class="end-box" id="endBox">
            <h2>投票已截止</h2>
            <p>本次投票已于2026年4月26日 12:00（北京时间）结束，感谢你的关注</p>
        </div>
    </div>

    <script>
        // ===================== 这里一键修改截止时间，格式不要改 =====================
        // 格式：年-月-日T时:分:秒+08:00 （+08:00是北京时间，不要删）
        const VOTE_END_TIME = new Date('2026-04-26T12:00:00+08:00');
        // ==========================================================================

        // 页面加载时，按优先级判断
        window.onload = function() {
            const now = new Date();
            const hasVoted = localStorage.getItem('lanYu_hasVoted');

            // 最高优先级：判断是否过了截止时间，过了直接锁死
            if (now >= VOTE_END_TIME) {
                document.getElementById('voteBox').style.display = 'none';
                document.getElementById('disabledBox').style.display = 'none';
                document.getElementById('endBox').style.display = 'block';
                return;
            }

            // 没到截止时间，再判断是否已经投过票
            if (hasVoted === 'true') {
                document.getElementById('voteBox').style.display = 'none';
                document.getElementById('endBox').style.display = 'none';
                document.getElementById('disabledBox').style.display = 'block';
            }
        }

        // 提交投票函数
        function submitVote(result) {
            const now = new Date();
            // 提交前二次校验截止时间，防止用户改代码绕过
            if (now >= VOTE_END_TIME) {
                alert('投票已截止，无法提交');
                window.location.reload();
                return;
            }

            // 给隐藏输入框赋值
            document.getElementById('voteResult').value = result;
            // 赋值提交时间
            document.getElementById('submitTime').value = now.toLocaleString('zh-CN');
            
            // 提交表单
            const form = document.getElementById('voteForm');
            form.submit();

            // 标记已投票，存入本地存储，防止二次提交
            localStorage.setItem('lanYu_hasVoted', 'true');
            
            // 显示成功提示
            document.getElementById('successTip').style.display = 'block';
        }
    </script>
</body>
</html>
